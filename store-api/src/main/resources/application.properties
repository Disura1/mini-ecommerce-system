spring.application.name=store-api

# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/mini_ecommerce_store_api_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

vendor.api.url=http://localhost:8081
vendor.api.low.stock.threshold=10
vendor.api.default.supplier.id=1